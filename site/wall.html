<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Agentic Trading — Wall</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<meta name="theme-color" content="#07090f">
<style>
  :root {
    color-scheme: dark;
    --bg:#07090f; --cyan:#7dd3fc; --purple:#a78bfa; --mint:#6ee7b7;
    --red:#fca5a5; --text:#e8eaf2; --muted:#9aa0b5;
    --panel:rgba(255,255,255,0.035); --panel-br:rgba(255,255,255,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background:
      radial-gradient(ellipse 70% 45% at 18% -6%, #16203b 0%, transparent 55%),
      radial-gradient(ellipse 55% 40% at 92% 4%, #241636 0%, transparent 52%),
      radial-gradient(ellipse 80% 45% at 50% 108%, #0b2620 0%, transparent 58%),
      var(--bg);
    color:var(--text); overflow:hidden;
    -webkit-font-smoothing:antialiased;
    user-select:none; -webkit-user-select:none;
  }
  /* slow drifting nebula so it's alive even without WebGL */
  body::before {
    content:""; position:fixed; inset:-20% -20% -20% -20%; z-index:0; pointer-events:none;
    background:
      radial-gradient(circle at 30% 40%, rgba(125,211,252,0.06), transparent 40%),
      radial-gradient(circle at 72% 62%, rgba(167,139,250,0.06), transparent 42%),
      radial-gradient(circle at 50% 88%, rgba(110,231,183,0.05), transparent 40%);
    animation:drift 46s ease-in-out infinite alternate; filter:blur(6px);
  }
  @keyframes drift { 0%{transform:translate3d(-2%,-1%,0) scale(1.02)} 100%{transform:translate3d(2%,2%,0) scale(1.08)} }

  #wall {
    position:relative; z-index:1;
    height:100vh; width:100vw; max-width:1240px; margin:0 auto;
    display:flex; flex-direction:column;
    padding:clamp(14px,2.4vh,34px) clamp(16px,3vw,40px);
    gap:clamp(10px,1.7vh,22px);
  }

  /* ---------- top bar ---------- */
  #topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
  #clock {
    font-size:clamp(20px,2.7vh,34px); font-weight:800; letter-spacing:.01em;
    font-variant-numeric:tabular-nums; line-height:1;
    background:linear-gradient(120deg,#eaf0ff,#c3ccec 60%,#e7ecfb);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  #date { margin-top:5px; font-size:clamp(11px,1.35vh,15px); font-weight:600; color:var(--muted); letter-spacing:.04em; }
  #statuschip {
    margin-top:11px; display:inline-flex; align-items:center; gap:9px; max-width:min(62vw,560px);
    font-size:clamp(11px,1.45vh,15px); font-weight:600;
    padding:8px 15px; border-radius:999px;
    background:rgba(110,231,183,0.08); border:1px solid rgba(110,231,183,0.28); color:#e8f6ef;
    backdrop-filter:blur(12px) saturate(150%); -webkit-backdrop-filter:blur(12px) saturate(150%);
  }
  #statuschip .sk { font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:var(--mint); flex:none; }
  #statuschip .st { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #topright { display:flex; flex-direction:column; align-items:flex-end; gap:10px; flex:none; }
  #back {
    display:inline-flex; align-items:center; gap:7px; text-decoration:none;
    font-size:12.5px; font-weight:700; color:#c4c9db;
    padding:8px 14px; border-radius:999px;
    background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.10);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    transition:border-color .2s ease,color .2s ease;
  }
  #back:hover { color:#fff; border-color:rgba(125,211,252,.45); }
  #updated {
    display:inline-flex; align-items:center; gap:8px;
    font-size:11.5px; font-weight:600; color:#aab0c5; font-variant-numeric:tabular-nums;
    padding:7px 13px; border-radius:999px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  #updated .dot { width:7px; height:7px; border-radius:50%; background:var(--mint); box-shadow:0 0 8px rgba(110,231,183,.75); animation:blink 2s ease-in-out infinite; flex:none; }
  #updated.stale .dot { background:#fcd34d; box-shadow:0 0 8px rgba(252,211,77,.7); animation:none; }
  #updated.err .dot { background:var(--red); box-shadow:0 0 8px rgba(252,165,165,.7); animation:none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ---------- hero ---------- */
  #hero { display:flex; flex-direction:column; }
  #heroLabel { font-size:11px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:#7c8299; margin-bottom:6px; }
  #heroStage { position:relative; width:100%; height:clamp(120px,15.5vh,230px); }
  #heroStage canvas { display:block; width:100%; height:100%; }
  #heroFallback {
    display:none; font-size:clamp(52px,12vh,150px); font-weight:800; letter-spacing:-.02em;
    font-variant-numeric:tabular-nums; line-height:1;
    background:linear-gradient(118deg,#f4f8ff 4%,#c6cfee 34%,#7d88ac 52%,#dfe6fb 70%,#aeb7d6 96%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 54px rgba(125,211,252,.22);
  }
  #hero.fallback #heroStage { display:none; }
  #hero.fallback #heroFallback { display:block; }
  #heroChange { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-top:8px; }
  #dayChange { font-size:clamp(22px,3.4vh,42px); font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.01em; color:var(--muted); transition:color .4s ease; }
  #dayChangePct { font-size:clamp(15px,2.1vh,26px); font-weight:700; font-variant-numeric:tabular-nums; color:var(--muted); transition:color .4s ease; }
  #heroChange.up #dayChange, #heroChange.up #dayChangePct { color:var(--mint); text-shadow:0 0 22px rgba(110,231,183,.35); }
  #heroChange.down #dayChange, #heroChange.down #dayChangePct { color:var(--red); text-shadow:0 0 22px rgba(252,165,165,.32); }
  #heroChange .arr { font-size:.8em; }
  #heroSince { font-size:clamp(11px,1.3vh,14px); font-weight:600; color:#8188a0; margin-left:2px; }
  #asOf { margin-top:5px; font-size:clamp(10.5px,1.25vh,13.5px); color:#7c8299; font-weight:500; }

  /* ---------- chart ---------- */
  #chartSection { display:flex; flex-direction:column; gap:9px; }
  #rangeRow { display:flex; gap:7px; flex-wrap:wrap; }
  .rangeBtn {
    font:inherit; cursor:pointer; font-size:12.5px; font-weight:700; letter-spacing:.03em;
    color:#aab0c5; padding:7px 15px; border-radius:999px;
    background:rgba(255,255,255,0.035); border:1px solid rgba(255,255,255,0.08);
    transition:all .18s ease;
  }
  .rangeBtn:hover { color:#e8eaf2; border-color:rgba(125,211,252,.35); }
  .rangeBtn.active {
    color:#eaf6ff; border-color:rgba(125,211,252,.55);
    background:linear-gradient(135deg,rgba(125,211,252,.16),rgba(167,139,250,.12));
    box-shadow:0 0 18px rgba(125,211,252,.18);
  }
  #chartWrap {
    position:relative; width:100%; height:clamp(210px,25vh,440px);
    border-radius:18px; overflow:hidden;
    background:linear-gradient(180deg,rgba(125,211,252,0.03),rgba(10,13,22,0.15));
    border:1px solid rgba(255,255,255,0.06);
  }
  #equityCanvas { display:block; width:100%; height:100%; }
  #chartEmpty {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#606784;
  }
  #chartWrap.empty #chartEmpty { display:flex; }
  #chartMeta { display:flex; align-items:center; justify-content:space-between; gap:12px; font-size:clamp(11px,1.3vh,14px); }
  #chartHL { font-weight:700; font-variant-numeric:tabular-nums; color:#c4c9db; }
  #chartHL .hi { color:var(--mint); } #chartHL .lo { color:#c0c6dc; } #chartHL .sep { color:#4c5474; margin:0 8px; }
  #chartRange { color:var(--muted); font-weight:600; }

  /* ---------- ticker ---------- */
  #tickerSection {
    position:relative; overflow:hidden; border-radius:13px;
    background:rgba(255,255,255,0.028); border:1px solid rgba(255,255,255,0.07);
    padding:11px 0; flex:none;
  }
  #tickerSection::before, #tickerSection::after {
    content:""; position:absolute; top:0; bottom:0; width:56px; z-index:2; pointer-events:none;
  }
  #tickerSection::before { left:0; background:linear-gradient(90deg,#0a0d15,transparent); }
  #tickerSection::after { right:0; background:linear-gradient(270deg,#0a0d15,transparent); }
  #tickerTag {
    position:absolute; left:0; top:0; bottom:0; z-index:3; display:flex; align-items:center;
    padding:0 15px 0 16px; font-size:10px; font-weight:800; letter-spacing:.14em; text-transform:uppercase;
    color:#07090f; background:linear-gradient(120deg,var(--cyan),var(--purple));
    border-radius:13px 0 0 13px;
  }
  #ticker { white-space:nowrap; will-change:transform; padding-left:118px; }
  #tickerTrack { display:inline-block; }
  #ticker.run #tickerTrack { animation:crawl linear infinite; }
  @keyframes crawl { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .tk { display:inline-block; font-size:clamp(13px,1.7vh,17px); font-weight:500; color:#d3d8ea; padding:0 4px; }
  .tk .dia { color:var(--cyan); margin:0 22px; opacity:.7; }
  .tk b { color:#fff; font-weight:700; }

  /* ---------- lower grid ---------- */
  #lowerGrid { display:grid; grid-template-columns:1fr 1fr; gap:clamp(10px,1.6vh,18px); flex:1 1 auto; min-height:0; }
  .panel {
    display:flex; flex-direction:column; min-height:0;
    background:var(--panel); border:1px solid var(--panel-br); border-radius:16px;
    padding:clamp(12px,1.7vh,18px) clamp(13px,1.8vw,20px);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  .panel-title { font-size:10.5px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:#7c8299; margin-bottom:11px; display:flex; align-items:center; gap:8px; flex:none; }
  .panel-title .cnt { color:#5a6180; font-weight:700; letter-spacing:.04em; }
  .scroller { overflow:hidden; display:flex; flex-direction:column; gap:9px; }

  .pos { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 12px; border-radius:11px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); }
  .pos-l { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .pos-sym { font-size:clamp(15px,1.95vh,20px); font-weight:800; letter-spacing:.01em; }
  .pos-qty { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .pos-r { text-align:right; flex:none; }
  .pos-val { font-size:clamp(13px,1.7vh,17px); font-weight:700; font-variant-numeric:tabular-nums; }
  .pos-pl { font-size:11.5px; font-weight:700; font-variant-numeric:tabular-nums; margin-top:2px; }
  .up { color:var(--mint); } .down { color:var(--red); } .flat { color:var(--muted); }

  .trade { display:flex; gap:11px; padding:8px 4px; border-bottom:1px solid rgba(255,255,255,0.04); }
  .trade:last-child { border-bottom:none; }
  .trade-t { flex:none; width:58px; font-size:11px; font-weight:700; color:#8188a0; font-variant-numeric:tabular-nums; padding-top:2px; }
  .trade-m { min-width:0; }
  .trade-h { display:flex; align-items:center; gap:8px; margin-bottom:2px; }
  .trade-sym { font-size:13.5px; font-weight:800; letter-spacing:.02em; }
  .badge { font-size:8.5px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; padding:2px 6px; border-radius:6px; }
  .badge.live { color:#07090f; background:var(--mint); }
  .badge.paper { color:#cdd3e6; background:rgba(255,255,255,0.10); }
  .trade-txt { font-size:12px; line-height:1.42; color:#aab0c5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .trade-txt b { color:#d3d8ea; font-weight:650; }

  #thinkingPanel { flex:none; }
  #thinkingText { font-size:clamp(13px,1.7vh,17px); line-height:1.5; color:#cdd3e6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  #thinkingText b { color:#fff; font-weight:650; }
  #thinkingMeta { margin-top:8px; font-size:11px; color:#7c8299; font-weight:600; }

  .muted-empty { font-size:12.5px; color:#606784; padding:6px 2px; }

  /* boot shimmer */
  #boot {
    position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:#07090f; transition:opacity .7s ease;
    font-size:12px; letter-spacing:.18em; text-transform:uppercase; font-weight:700; color:#6a7088;
  }
  #boot.hide { opacity:0; pointer-events:none; }
  #boot .spin { width:24px; height:24px; margin-right:13px; border-radius:50%; border:2.5px solid rgba(125,211,252,.18); border-top-color:var(--cyan); animation:sp .8s linear infinite; }
  @keyframes sp { to{ transform:rotate(360deg); } }

  @media (max-aspect-ratio:3/4) { /* tall portrait wall */
    #heroStage { height:clamp(150px,13vh,260px); }
    #chartWrap { height:clamp(260px,22vh,520px); }
  }
  @media (max-width:640px) {
    #lowerGrid { grid-template-columns:1fr; }
    #statuschip { max-width:80vw; }
  }
  @media (prefers-reduced-motion:reduce) {
    #updated .dot, .spin, body::before, #ticker.run #tickerTrack { animation:none; }
  }
</style>
</head>
<body>
  <div id="boot"><span class="spin"></span><span>Warming up the wall</span></div>

  <div id="wall">
    <header id="topbar">
      <div id="clockbox">
        <div id="clock">--:--:--</div>
        <div id="date">—</div>
        <div id="statuschip"><span class="sk">Session</span><span class="st" id="statusText">connecting…</span></div>
      </div>
      <div id="topright">
        <a id="back" href="./" aria-label="Back to dashboard">← dashboard</a>
        <div id="updated"><span class="dot"></span><span id="updatedText">connecting…</span></div>
      </div>
    </header>

    <section id="hero">
      <div id="heroLabel">Live account value</div>
      <div id="heroStage"></div>
      <div id="heroFallback">$—</div>
      <div id="heroChange">
        <span id="dayChange">$0.00</span>
        <span id="dayChangePct">0.00%</span>
        <span id="heroSince"></span>
      </div>
      <div id="asOf">connecting…</div>
    </section>

    <section id="chartSection">
      <div id="rangeRow">
        <button class="rangeBtn" data-range="1H">1H</button>
        <button class="rangeBtn" data-range="1D">1D</button>
        <button class="rangeBtn" data-range="1W">1W</button>
        <button class="rangeBtn" data-range="1M">1M</button>
        <button class="rangeBtn" data-range="6M">6M</button>
        <button class="rangeBtn" data-range="1Y">1Y</button>
      </div>
      <div id="chartWrap">
        <canvas id="equityCanvas"></canvas>
        <div id="chartEmpty">collecting data…</div>
      </div>
      <div id="chartMeta">
        <span id="chartHL"><span class="hi">H $—</span><span class="sep">·</span><span class="lo">L $—</span></span>
        <span id="chartRange">—</span>
      </div>
    </section>

    <section id="tickerSection">
      <div id="tickerTag">Thinking</div>
      <div id="ticker"><div id="tickerTrack"></div></div>
    </section>

    <section id="lowerGrid">
      <div class="panel" id="positionsPanel">
        <div class="panel-title">Open positions <span class="cnt" id="posCount"></span></div>
        <div class="scroller" id="positionsList"><div class="muted-empty">loading…</div></div>
      </div>
      <div class="panel" id="tradesPanel">
        <div class="panel-title">Recent trades</div>
        <div class="scroller" id="tradesList"><div class="muted-empty">loading…</div></div>
      </div>
    </section>

    <section class="panel" id="thinkingPanel">
      <div class="panel-title">What the engine's thinking</div>
      <div id="thinkingText">…</div>
      <div id="thinkingMeta"></div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  "use strict";
  (function () {
    // =====================================================================
    //  Agentic Trading — WALL DISPLAY
    //  A portrait ambient scoreboard. Hero = a metallic 3D account value
    //  (per-digit textured planes, baked chrome gradient + rim, additive
    //  bloom sprites, a live specular sweep, and pointer/tilt parallax).
    //  Below: a glowing gradient equity chart with light-sprites tracing
    //  the line, a news-crawl of the engine's thoughts, and positions /
    //  trades. Fake-bloom via additive sprites (no r128 postprocessing).
    // =====================================================================

    var COL = { bg:0x07090f, cyan:0x7dd3fc, purple:0xa78bfa, mint:0x6ee7b7, red:0xfca5a5, text:0xe8eaf2, muted:0x9aa0b5 };
    var CSSC = { cyan:"#7dd3fc", purple:"#a78bfa", mint:"#6ee7b7", red:"#fca5a5" };

    var PRIMARY  = "https://raw.githubusercontent.com/neongatsby/agentic-trading-site/main/site/data.json";
    var FALLBACK = "./data.json";
    var POLL_MS  = 20000;

    // ---- DOM refs ----
    var $ = function (id) { return document.getElementById(id); };
    var elBoot = $("boot");
    var elClock = $("clock"), elDate = $("date"), elStatusText = $("statusText");
    var elUpdated = $("updated"), elUpdatedText = $("updatedText");
    var elHero = $("hero"), elHeroStage = $("heroStage"), elHeroFallback = $("heroFallback");
    var elHeroChange = $("heroChange"), elDayChange = $("dayChange"), elDayChangePct = $("dayChangePct"), elHeroSince = $("heroSince");
    var elAsOf = $("asOf");
    var elChartWrap = $("chartWrap"), elCanvas = $("equityCanvas"), elChartHL = $("chartHL"), elChartRange = $("chartRange");
    var elTicker = $("ticker"), elTickerTrack = $("tickerTrack");
    var elPositions = $("positionsList"), elPosCount = $("posCount"), elTrades = $("tradesList");
    var elThinking = $("thinkingText"), elThinkingMeta = $("thinkingMeta");

    // ---- shared state ----
    var state = { data:null, equity:null, dayPnl:0, totalPnl:0, generatedAt:null, marketNote:"" };
    var currentRange = "1D";

    // =====================================================================
    //  formatting / text helpers
    // =====================================================================
    function fmtMoney(n) {
      if (n == null || isNaN(n)) return "$—";
      return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
    }
    function fmtSigned(n) {
      if (n == null || isNaN(n)) return "—";
      var s = n >= 0 ? "+" : "−";
      return s + "$" + Math.abs(Number(n)).toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
    }
    function fmtPct(n) {
      if (n == null || isNaN(n)) return "—";
      var s = n >= 0 ? "+" : "−";
      return s + Math.abs(n).toFixed(2) + "%";
    }
    function fmtCompact(n) {
      if (n == null || isNaN(n)) return "$—";
      return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
    }
    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" })[c]; }); }
    // **bold** friend-voice markdown → <b>  (keeps original sentence case)
    function rich(s) { return esc(s).replace(/\*\*(.+?)\*\*/g, "<b>$1</b>"); }
    // strip markdown to plain text (for the crawl / short snippets)
    function plain(s) { return String(s == null ? "" : s).replace(/\*\*(.+?)\*\*/g, "$1").replace(/\s+/g, " ").trim(); }
    function timeStr(ts) {
      var t = typeof ts === "number" ? ts : Date.parse(ts);
      if (isNaN(t)) return "";
      return new Date(t).toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
    }

    // =====================================================================
    //  clock
    // =====================================================================
    function tickClock() {
      var now = new Date();
      elClock.textContent = now.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false });
      elDate.textContent = now.toLocaleDateString([], { weekday:"long", month:"long", day:"numeric" });
    }
    tickClock();
    setInterval(tickClock, 1000);

    // =====================================================================
    //  DATA LAYER
    // =====================================================================
    function fetchOnce(url) {
      return fetch(url + "?t=" + Date.now(), { cache:"no-store" })
        .then(function (r) { if (!r.ok) throw new Error("http " + r.status); return r.json(); });
    }
    function poll() {
      fetchOnce(PRIMARY)
        .catch(function () { return fetchOnce(FALLBACK); })
        .then(function (d) { applyData(d); markUpdated(); })
        .catch(function (err) {
          console.warn("[wall] data fetch failed:", err && err.message);
          if (state.equity === null) { elHero.classList.add("fallback"); elHeroFallback.textContent = "$—"; }
          elUpdated.classList.add("err"); elUpdatedText.textContent = "reconnecting…";
        });
    }

    function applyData(d) {
      if (!d || !d.live) throw new Error("bad shape");
      state.data = d;
      var live = d.live;
      var eq = Number(live.equity);
      state.equity = isNaN(eq) ? state.equity : eq;
      state.dayPnl = Number(live.day_pnl) || 0;
      state.totalPnl = Number(live.total_pnl) || 0;
      state.generatedAt = d.generated_at || null;
      state.marketNote = d.market_note || "";

      renderHeroChange();
      renderStatus(d.status);

    // =====================================================================
    //  TIME-RANGE SERIES DERIVATION
    //  Buttons: 1H · 1D · 1W · 1M · 6M · 1Y
    //  Map:  1D→"1D"  1M→"1M"  1Y→"1Y";  1H=last 60min of 1D,
    //        1W=last 7d of 1M, 6M=last 180d of 1Y.
    //  Fallbacks: live.intraday ({t,v}) then live.equity_curve ({date,value}).
    //  Each source normalizes to { pts:[[x,y]...], isTime, startLab, endLab }.
    // =====================================================================
    var DAY = 24 * 3600 * 1000;

    function ehSeries(d, key) {
      var eh = d.equity_history || {};
      var a = eh[key];
      return Array.isArray(a) ? a.filter(function (p) { return Array.isArray(p) && p.length >= 2 && isFinite(p[0]) && isFinite(p[1]); }) : [];
    }
    function tailByTime(arr, ms) {
      if (!arr || arr.length < 2) return arr || [];
      var last = arr[arr.length - 1][0];
      var out = arr.filter(function (p) { return p[0] >= last - ms; });
      return out.length >= 2 ? out : arr; // never return a broken single-point slice
    }
    function intradayPts(d) {
      var ia = d.live && d.live.intraday;
      if (!Array.isArray(ia)) return [];
      return ia.filter(function (p) { return p && isFinite(p.t) && isFinite(p.v); }).map(function (p) { return [p.t, p.v]; });
    }
    function curvePts(d) {
      var c = d.live && d.live.equity_curve;
      if (!Array.isArray(c) || !c.length) return null;
      return c.map(function (p, i) { return { x:i, y:Number(p.value), lab:p.date }; }).filter(function (p) { return isFinite(p.y); });
    }

    // returns { pts:[[x,y]...], isTime, startLab, endLab, empty }
    function seriesForRange(d, range) {
      var raw = [], isTime = true;
      if (range === "1H") {
        raw = tailByTime(ehSeries(d, "1D"), 60 * 60 * 1000);
        if (raw.length < 2) { var ip = intradayPts(d); if (ip.length >= 2) raw = tailByTime(ip, 60 * 60 * 1000); }
      } else if (range === "1D") {
        raw = ehSeries(d, "1D");
        if (raw.length < 2) raw = intradayPts(d);
      } else if (range === "1W") {
        raw = tailByTime(ehSeries(d, "1M"), 7 * DAY);
      } else if (range === "1M") {
        raw = ehSeries(d, "1M");
      } else if (range === "6M") {
        raw = tailByTime(ehSeries(d, "1Y"), 180 * DAY);
      } else if (range === "1Y") {
        raw = ehSeries(d, "1Y");
      }

      if (raw && raw.length >= 2) {
        return {
          pts: raw.map(function (p) { return [p[0], p[1]]; }),
          isTime: true,
          startLab: labelFor(raw[0][0], range),
          endLab: labelFor(raw[raw.length - 1][0], range),
          empty: false
        };
      }
      // final fallback: the daily equity curve (indexed x, date labels)
      var cp = curvePts(d);
      if (cp && cp.length >= 2) {
        return {
          pts: cp.map(function (p) { return [p.x, p.y]; }),
          isTime: false,
          startLab: cp[0].lab || "",
          endLab: cp[cp.length - 1].lab || "",
          empty: false
        };
      }
      return { pts: [], isTime: true, startLab: "", endLab: "", empty: true };
    }

    function labelFor(ms, range) {
      var dte = new Date(ms);
      if (range === "1H" || range === "1D") return dte.toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
      return dte.toLocaleDateString([], { month:"short", day:"numeric" });
    }
    function rangeCaption(range, ser) {
      if (ser.empty) return "collecting…";
      var map = { "1H":"past hour", "1D":"today", "1W":"past week", "1M":"past month", "6M":"past 6 months", "1Y":"past year" };
      var base = map[range] || "";
      if (ser.startLab && ser.endLab) return base + "  ·  " + ser.startLab + " – " + ser.endLab;
      return base;
    }

    // =====================================================================
    //  EQUITY CHART  (custom canvas 2D — gradient glow line, area fill,
    //  pulsing end-dot, and light-sprites tracing the path)
    // =====================================================================
    var chart = { ser:null, pts:[], min:0, max:1, revealT:1, W:0, H:0, dpr:1, plX:[], plY:[], cum:[], total:0 };

    function sizeChart() {
      var r = elChartWrap.getBoundingClientRect();
      chart.dpr = Math.min(window.devicePixelRatio || 1, 2);
      chart.W = Math.max(2, Math.round(r.width));
      chart.H = Math.max(2, Math.round(r.height));
      elCanvas.width = Math.round(chart.W * chart.dpr);
      elCanvas.height = Math.round(chart.H * chart.dpr);
      buildChartGeometry();
    }

    function renderChart(range) {
      currentRange = range;
      var btns = document.querySelectorAll(".rangeBtn");
      for (var i = 0; i < btns.length; i++) btns[i].classList.toggle("active", btns[i].getAttribute("data-range") === range);
      if (!state.data) return;
      var ser = seriesForRange(state.data, range);
      chart.ser = ser;
      elChartWrap.classList.toggle("empty", !!ser.empty);
      elChartRange.textContent = rangeCaption(range, ser);
      if (ser.empty || ser.pts.length < 2) {
        chart.pts = [];
        elChartHL.innerHTML = '<span class="hi">H $—</span><span class="sep">·</span><span class="lo">L $—</span>';
        return;
      }
      chart.pts = ser.pts;
      var ys = ser.pts.map(function (p) { return p[1]; });
      chart.min = Math.min.apply(null, ys);
      chart.max = Math.max.apply(null, ys);
      elChartHL.innerHTML = '<span class="hi">H ' + esc(fmtCompact(chart.max)) + '</span>' +
                            '<span class="sep">·</span>' +
                            '<span class="lo">L ' + esc(fmtCompact(chart.min)) + '</span>';
      chart.revealT = 0; // draw-on animation
      buildChartGeometry();
    }

    function buildChartGeometry() {
      var pts = chart.pts;
      chart.plX = []; chart.plY = []; chart.cum = []; chart.total = 0;
      if (!pts || pts.length < 2) return;
      var padL = 8, padR = 8, padT = 20, padB = 14;
      var w = chart.W, h = chart.H;
      var xs = pts.map(function (p) { return p[0]; });
      var xMin = Math.min.apply(null, xs), xMax = Math.max.apply(null, xs);
      var xSpan = (xMax - xMin) || 1;
      var yMin = chart.min, yMax = chart.max;
      var ySpan = (yMax - yMin) || 1;
      // add headroom so the line breathes
      var pad = ySpan * 0.14; yMin -= pad; yMax += pad; ySpan = yMax - yMin;
      for (var i = 0; i < pts.length; i++) {
        var px = padL + (pts[i][0] - xMin) / xSpan * (w - padL - padR);
        var py = padT + (1 - (pts[i][1] - yMin) / ySpan) * (h - padT - padB);
        chart.plX.push(px); chart.plY.push(py);
      }
      chart.cum.push(0);
      for (var j = 1; j < pts.length; j++) {
        var dx = chart.plX[j] - chart.plX[j - 1], dy = chart.plY[j] - chart.plY[j - 1];
        chart.total += Math.sqrt(dx * dx + dy * dy);
        chart.cum.push(chart.total);
      }
    }

    // point at arc-length fraction u (0..1) along the polyline
    function pointAtU(u) {
      var target = u * chart.total, n = chart.plX.length;
      if (n < 2) return null;
      for (var i = 1; i < n; i++) {
        if (chart.cum[i] >= target) {
          var seg = chart.cum[i] - chart.cum[i - 1] || 1;
          var f = (target - chart.cum[i - 1]) / seg;
          return { x: chart.plX[i - 1] + (chart.plX[i] - chart.plX[i - 1]) * f,
                   y: chart.plY[i - 1] + (chart.plY[i] - chart.plY[i - 1]) * f };
        }
      }
      return { x: chart.plX[n - 1], y: chart.plY[n - 1] };
    }

    function drawChart(t) {
      var ctx = elCanvas.getContext("2d");
      if (!ctx) return;
      var dpr = chart.dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, chart.W, chart.H);
      var n = chart.plX.length;
      if (n < 2) return;

      chart.revealT = Math.min(1, chart.revealT + 0.03);
      var rev = 1 - Math.pow(1 - chart.revealT, 3);
      var upMood = state.dayPnl >= 0;

      // gradient stroke cyan → purple → mint across x
      var grad = ctx.createLinearGradient(0, 0, chart.W, 0);
      grad.addColorStop(0, CSSC.cyan); grad.addColorStop(0.55, CSSC.purple); grad.addColorStop(1, CSSC.mint);

      // how far along to draw for the reveal
      var drawTo = Math.max(1, Math.floor((n - 1) * rev));
      var endPt = pointAtU(rev);

      // ---- area fill under the (revealed) line ----
      ctx.beginPath();
      ctx.moveTo(chart.plX[0], chart.plY[0]);
      for (var i = 1; i <= drawTo; i++) ctx.lineTo(chart.plX[i], chart.plY[i]);
      if (endPt) ctx.lineTo(endPt.x, endPt.y);
      ctx.lineTo(endPt ? endPt.x : chart.plX[drawTo], chart.H);
      ctx.lineTo(chart.plX[0], chart.H);
      ctx.closePath();
      var fill = ctx.createLinearGradient(0, 0, 0, chart.H);
      fill.addColorStop(0, upMood ? "rgba(110,231,183,0.20)" : "rgba(125,211,252,0.18)");
      fill.addColorStop(0.5, "rgba(167,139,250,0.07)");
      fill.addColorStop(1, "rgba(125,211,252,0.0)");
      ctx.fillStyle = fill;
      ctx.fill();

      // ---- glow underlay ----
      ctx.save();
      ctx.lineJoin = "round"; ctx.lineCap = "round";
      ctx.strokeStyle = grad;
      ctx.shadowColor = "rgba(125,211,252,0.55)"; ctx.shadowBlur = 22;
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      ctx.moveTo(chart.plX[0], chart.plY[0]);
      for (var k = 1; k <= drawTo; k++) ctx.lineTo(chart.plX[k], chart.plY[k]);
      if (endPt) ctx.lineTo(endPt.x, endPt.y);
      ctx.stroke();
      // crisp core line
      ctx.shadowBlur = 0; ctx.lineWidth = 2.1; ctx.stroke();
      ctx.restore();

      // ---- light sprites tracing the path ----
      if (chart.revealT >= 0.98) {
        var SPRITES = 3;
        for (var s = 0; s < SPRITES; s++) {
          var u = ((t * 0.06) + s / SPRITES) % 1;

            var tu = u - tail * 0.012; if (tu < 0) tu += 1;
            var tp = pointAtU(tu); if (!tp) continue;
            var a = (1 - tail / 5) * 0.5;
            var rr = 3.4 - tail * 0.5;
            var g2 = ctx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, rr * 3);
            g2.addColorStop(0, "rgba(230,245,255," + a + ")");
            g2.addColorStop(1, "rgba(230,245,255,0)");
            ctx.fillStyle = g2;
            ctx.beginPath(); ctx.arc(tp.x, tp.y, rr * 3, 0, Math.PI * 2); ctx.fill();
          }
          ctx.fillStyle = "rgba(255,255,255,0.95)";
          ctx.beginPath(); ctx.arc(p.x, p.y, 2.0, 0, Math.PI * 2); ctx.fill();
        }
      }

      // ---- pulsing end-dot ----
      if (endPt) {
        var pulse = 0.5 + 0.5 * Math.sin(t * 3.0);
        var endCol = upMood ? "110,231,183" : "252,165,165";
        var halo = ctx.createRadialGradient(endPt.x, endPt.y, 0, endPt.x, endPt.y, 16 + pulse * 8);
        halo.addColorStop(0, "rgba(" + endCol + ",0.55)");
        halo.addColorStop(1, "rgba(" + endCol + ",0)");
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(endPt.x, endPt.y, 16 + pulse * 8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc(endPt.x, endPt.y, 3.4, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(" + endCol + ",0.9)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(endPt.x, endPt.y, 5.5 + pulse * 2, 0, Math.PI * 2); ctx.stroke();
      }
    }

    // =====================================================================
    //  RANGE BUTTON WIRING
    // =====================================================================
    (function wireRangeButtons() {
      var btns = document.querySelectorAll(".rangeBtn");
      for (var i = 0; i < btns.length; i++) {

    })();

    // =====================================================================
    //  HERO NUMBER — metallic 3D digits (Three.js r128, fake bloom)
    // =====================================================================
    var heroReady = false;
    var THREE_OK = (typeof THREE !== "undefined");
    var hScene, hCam, hRenderer, hRoot, hNumGroup, hBgGroup, hSweep, hParticles, hParticleGeo;
    var hGlyphs = [];          // { mesh, glow, ch, anim }
    var hCurrentStr = "";
    var hGlyphTex = {};        // char -> CanvasTexture
    var hGlowTex = null, hSweepTex = null;
    var hPointerX = 0, hPointerY = 0, hTiltX = 0, hTiltY = 0;
    var GS = 1.5;              // glyph world height
    var ADV = { "0":0.62,"1":0.52,"2":0.62,"3":0.62,"4":0.64,"5":0.62,"6":0.62,"7":0.60,"8":0.62,"9":0.62,",":0.30,".":0.28,"$":0.60,"−":0.42,"-":0.42 };

    function webglOK() {

      catch (e) { return false; }

    function hueLerp(tt) {
      // cyan → purple → mint
      var c1 = new THREE.Color(COL.cyan), c2 = new THREE.Color(COL.purple), c3 = new THREE.Color(COL.mint), c = new THREE.Color();
      if (tt < 0.5) c.copy(c1).lerp(c2, tt / 0.5); else c.copy(c2).lerp(c3, (tt - 0.5) / 0.5);

    }

    function makeGlyphTexture(ch) {
      if (hGlyphTex[ch]) return hGlyphTex[ch];

      var cv = document.createElement("canvas"); cv.width = S; cv.height = S;
      var g = cv.getContext("2d");
      g.clearRect(0, 0, S, S);
      g.font = "800 190px -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif";
      g.textAlign = "center"; g.textBaseline = "middle";

      g.fillStyle = "rgba(220,235,255,0.9)";

      g.restore();

      // metallic vertical gradient (polished steel / chrome)
      var grad = g.createLinearGradient(0, S * 0.16, 0, S * 0.86);
      grad.addColorStop(0.00, "#ffffff");
      grad.addColorStop(0.16, "#eaf0ff");
      grad.addColorStop(0.34, "#c2ccea");
      grad.addColorStop(0.50, "#828cad");
      grad.addColorStop(0.55, "#6b7597");
      grad.addColorStop(0.62, "#aab4d3");
      grad.addColorStop(0.80, "#f0f4ff");
      grad.addColorStop(1.00, "#b9c2de");

      sg.addColorStop(0.30, "rgba(255,255,255,0)");
      sg.addColorStop(0.46, "rgba(255,255,255,0.55)");
      sg.addColorStop(0.54, "rgba(255,255,255,0.0)");

      g.fillRect(0, 0, S, S);

      g.strokeText(ch, cx, cy - 1.4);

    }

    function makeGlowTexture() {

      var S = 128, cv = document.createElement("canvas"); cv.width = S; cv.height = S;
      var g = cv.getContext("2d");
      var grd = g.createRadialGradient(S/2, S/2, 0, S/2, S/2, S/2);
      grd.addColorStop(0, "rgba(255,255,255,1)");
      grd.addColorStop(0.28, "rgba(255,255,255,0.5)");
      grd.addColorStop(0.6, "rgba(255,255,255,0.12)");
      grd.addColorStop(1, "rgba(255,255,255,0)");
      g.fillStyle = grd; g.fillRect(0, 0, S, S);
      hGlowTex = new THREE.CanvasTexture(cv); return hGlowTex;
    }
    function makeSweepTexture() {
      if (hSweepTex) return hSweepTex;
      var W = 256, H = 64, cv = document.createElement("canvas"); cv.width = W; cv.height = H;
      var g = cv.getContext("2d");
      var grd = g.createLinearGradient(0, 0, W, 0);
      grd.addColorStop(0.0, "rgba(255,255,255,0)");
      grd.addColorStop(0.44, "rgba(255,255,255,0)");
      grd.addColorStop(0.5, "rgba(255,255,255,0.9)");
      grd.addColorStop(0.56, "rgba(255,255,255,0)");
      grd.addColorStop(1.0, "rgba(255,255,255,0)");
      g.fillStyle = grd; g.fillRect(0, 0, W, H);
      hSweepTex = new THREE.CanvasTexture(cv); return hSweepTex;
    }

    function heroInit() {
      hScene = new THREE.Scene();
      var w = elHeroStage.clientWidth || 600, h = elHeroStage.clientHeight || 200;
      var aspect = w / h, viewH = 3.4;
      hCam = new THREE.OrthographicCamera(-viewH*aspect/2, viewH*aspect/2, viewH/2, -viewH/2, -50, 50);
      hCam.position.z = 10;

      hRenderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:"high-performance" });
      hRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      hRenderer.setSize(w, h);
      hRenderer.setClearColor(0x000000, 0);
      elHeroStage.appendChild(hRenderer.domElement);

      hRoot = new THREE.Group(); hScene.add(hRoot);

      // ambient depth blobs (parallax back layer)
      hBgGroup = new THREE.Group(); hBgGroup.position.z = -3; hRoot.add(hBgGroup);
      var blobCols = [COL.cyan, COL.purple, COL.mint];
      for (var b = 0; b < 3; b++) {
        var sp = new THREE.Sprite(new THREE.SpriteMaterial({ map:makeGlowTexture(), color:new THREE.Color(blobCols[b]), transparent:true, opacity:0.22, depthWrite:false, blending:THREE.AdditiveBlending }));
        sp.scale.set(4.2, 3.0, 1);
        sp.position.set((b - 1) * 2.4, (b % 2 ? 0.4 : -0.4), 0);
        hBgGroup.add(sp);
      }

      // number group (foreground)
      hNumGroup = new THREE.Group(); hRoot.add(hNumGroup);

      // moving specular sweep across the numerals
      hSweep = new THREE.Sprite(new THREE.SpriteMaterial({ map:makeSweepTexture(), color:0xffffff, transparent:true, opacity:0.0, depthWrite:false, blending:THREE.AdditiveBlending }));
      hSweep.scale.set(2.0, GS * 1.25, 1);
      hSweep.position.z = 0.6;
      hRoot.add(hSweep);

      // light particle field (alive when idle)
      var N = 90;
      hParticleGeo = new THREE.BufferGeometry();
      var pos = new Float32Array(N * 3), spd = new Float32Array(N);
      for (var i = 0; i < N; i++) {
        pos[i*3] = (Math.random() - 0.5) * 14;
        pos[i*3+1] = (Math.random() - 0.5) * 5;
        pos[i*3+2] = -1.5 - Math.random() * 2;
        spd[i] = 0.1 + Math.random() * 0.3;
      }
      hParticleGeo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
      hParticleGeo.userData.spd = spd;
      hParticles = new THREE.Points(hParticleGeo, new THREE.PointsMaterial({ size:0.09, map:makeGlowTexture(), transparent:true, opacity:0.4, depthWrite:false, blending:THREE.AdditiveBlending, color:new THREE.Color(COL.cyan) }));
      hBgGroup.add(hParticles);

      window.addEventListener("pointermove", function (e) { hPointerX = (e.clientX / window.innerWidth - 0.5) * 2; hPointerY = (e.clientY / window.innerHeight - 0.5) * 2; }, { passive:true });
      window.addEventListener("deviceorientation", function (e) { if (e.gamma != null) hTiltX = Math.max(-1, Math.min(1, e.gamma / 35)); if (e.beta != null) hTiltY = Math.max(-1, Math.min(1, (e.beta - 45) / 45)); }, { passive:true });

      heroReady = true;
    }

    function heroBuildRow(str) {
      // tear down
      for (var i = 0; i < hGlyphs.length; i++) { hNumGroup.remove(hGlyphs[i].mesh); hNumGroup.remove(hGlyphs[i].glow); }
      hGlyphs = [];
      // total width
      var totalW = 0, ci;
      for (ci = 0; ci < str.length; ci++) totalW += advOf(str[ci]);
      var x = -totalW / 2;
      var geo = new THREE.PlaneGeometry(GS, GS);
      for (ci = 0; ci < str.length; ci++) {
        var ch = str[ci];
        var adv = advOf(ch);
        var cxp = x + adv / 2;
        var hue = hueLerp(str.length <= 1 ? 0.5 : ci / (str.length - 1));
        // bloom sprite behind the glyph
        var glow = new THREE.Sprite(new THREE.SpriteMaterial({ map:makeGlowTexture(), color:hue.clone(), transparent:true, opacity:0.30, depthWrite:false, blending:THREE.AdditiveBlending }));
        glow.scale.set(GS * 1.25, GS * 1.35, 1);
        glow.position.set(cxp, 0, -0.25);
        hNumGroup.add(glow);
        // glyph plane
        var mat = new THREE.MeshBasicMaterial({ map:makeGlyphTexture(ch), transparent:true, depthWrite:false });
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(cxp, 0, 0);
        hNumGroup.add(mesh);
        hGlyphs.push({ mesh:mesh, glow:glow, ch:ch, anim:0, x:cxp });
        x += adv;
      }
      hCurrentStr = str;
      heroFit();
    }

    function heroFit() {
      var w = elHeroStage.clientWidth || 600, h = elHeroStage.clientHeight || 200;
      var aspect = w / h, viewH = 3.4;
      var visW = viewH * aspect;
      // measure row width
      var totalW = 0; for (var i = 0; i < hCurrentStr.length; i++) totalW += advOf(hCurrentStr[i]);
      totalW = Math.max(0.5, totalW);
      var scaleW = (visW * 0.94) / totalW;
      var scaleH = (viewH * 0.72) / GS;
      var sc = Math.min(scaleW, scaleH);
      hNumGroup.scale.set(sc, sc, sc);
      hSweep.scale.set(totalW * sc * 0.55, GS * sc * 1.2, 1);
    }

    function heroSetValue(v) {
      if (!heroReady) return;
      var str = fmtMoney(v);
      if (str === hCurrentStr) return;
      if (str.length !== hCurrentStr.length) { heroBuildRow(str); heroPulse(); return; }
      // diff & animate only changed glyphs
      for (var i = 0; i < str.length; i++) {
        if (str[i] !== hGlyphs[i].ch) {
          hGlyphs[i].ch = str[i];
          hGlyphs[i].mesh.material.map = makeGlyphTexture(str[i]);
          hGlyphs[i].mesh.material.needsUpdate = true;
          hGlyphs[i].anim = 1; // drop-in + flash
        }
      }
      hCurrentStr = str;
      heroPulse();
    }
    var heroPulseT = 0, heroUp = true;
    function heroPulse() { heroPulseT = 1; heroUp = state.dayPnl >= 0; }

    function heroResize() {
      if (!heroReady) return;
      var w = elHeroStage.clientWidth || 600, h = elHeroStage.clientHeight || 200;
      var aspect = w / h, viewH = 3.4;
      hCam.left = -viewH*aspect/2; hCam.right = viewH*aspect/2; hCam.top = viewH/2; hCam.bottom = -viewH/2;
      hCam.updateProjectionMatrix();
      hRenderer.setSize(w, h);
      heroFit();
    }

    function heroUpdate(dt, t) {
      if (!heroReady) return;
      // parallax: tilt the whole readout with pointer / device
      var px = hPointerX + hTiltX, py = hPointerY + hTiltY;
      var tRotY = px * 0.14 + Math.sin(t * 0.25) * 0.02;
      var tRotX = -py * 0.10 + Math.cos(t * 0.2) * 0.015;
      hRoot.rotation.y += (tRotY - hRoot.rotation.y) * Math.min(1, dt * 3);
      hRoot.rotation.x += (tRotX - hRoot.rotation.x) * Math.min(1, dt * 3);
      // depth layer drifts opposite for parallax
      hBgGroup.position.x += ((-px * 0.5) - hBgGroup.position.x) * Math.min(1, dt * 2);
      hBgGroup.position.y += ((py * 0.35) - hBgGroup.position.y) * Math.min(1, dt * 2);

      // specular sweep glides across (driven by time + pointer)
      var totalW = 0; for (var g = 0; g < hCurrentStr.length; g++) totalW += advOf(hCurrentStr[g]);
      var sc = hNumGroup.scale.x || 1;
      var span = totalW * sc * 0.62;
      var sweepU = ((t * 0.16) % 1) * 2 - 1;         // -1..1
      hSweep.position.x = sweepU * span + px * 0.4 * span;
      hSweep.material.opacity = 0.10 + 0.14 * (0.5 + 0.5 * Math.sin(t * 0.9));

      // pulse decay (bloom flash on value change)
      heroPulseT *= Math.pow(0.05, dt);
      var flashCol = new THREE.Color(heroUp ? COL.mint : COL.red);

      // per-glyph animation
      for (var i = 0; i < hGlyphs.length; i++) {
        var gl = hGlyphs[i];
        var baseOpacity = 0.30;
        if (gl.anim > 0) {
          gl.anim = Math.max(0, gl.anim - dt / 0.45);
          var e = gl.anim; // 1 -> 0
          gl.mesh.position.y = (e * e) * 0.55 * GS * (hNumGroup.scale.x); // drop in from above
          var pop = 1 + e * 0.14;
          gl.mesh.scale.set(pop, pop, 1);
          gl.glow.material.opacity = baseOpacity + e * 0.6;
          gl.glow.material.color.lerp(flashCol, e * 0.5);
        } else {
          gl.mesh.position.y += (0 - gl.mesh.position.y) * Math.min(1, dt * 8);
          gl.mesh.scale.set(1, 1, 1);
          var idleGlow = baseOpacity + heroPulseT * 0.5 + 0.05 * Math.sin(t * 1.3 + i);
          gl.glow.material.opacity += (idleGlow - gl.glow.material.opacity) * Math.min(1, dt * 4);
        }
      }

      // particles drift
      var pos = hParticleGeo.attributes.position.array, spd = hParticleGeo.userData.spd;
      for (var p = 0; p < spd.length; p++) {
        pos[p*3] += spd[p] * dt * 0.4;
        if (pos[p*3] > 8) pos[p*3] = -8;
      }
      hParticleGeo.attributes.position.needsUpdate = true;

      hRenderer.render(hScene, hCam);
    }

    // =====================================================================
    //  MASTER LOOP
    // =====================================================================
    var running = true, lastT = 0, startT = 0;
    function frame(now) {
      if (!running) return;
      requestAnimationFrame(frame);
      var tSec = now / 1000;
      if (!startT) { startT = tSec; lastT = tSec; }
      var t = tSec - startT;
      var dt = Math.min(0.05, tSec - lastT); lastT = tSec;
      try { drawChart(t); } catch (e) { /* keep looping */ }
      if (heroReady) { try { heroUpdate(dt, t); } catch (e2) { } }
    }

    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        running = false;
        if (elTicker) elTicker.classList.remove("run");
      } else if (!running) {
        running = true; lastT = 0; startT = 0;
        if (elTickerTrack.innerHTML) elTicker.classList.add("run");
        requestAnimationFrame(frame);
        updateAgo(); poll();
      }
    });

    window.addEventListener("resize", function () {
      sizeChart();
      heroResize();
    }, { passive:true });

    function bootDone() {
      if (elBoot && !elBoot.classList.contains("hide")) {
        elBoot.classList.add("hide");
        setTimeout(function () { if (elBoot && elBoot.parentNode) elBoot.parentNode.removeChild(elBoot); }, 800);
      }
    }

    // =====================================================================
    //  BOOT
    // =====================================================================
    // hero: try WebGL 3D metallic, else CSS metallic fallback
    if (THREE_OK && webglOK()) {
      try { heroInit(); heroBuildRow("$0.00"); }
      catch (e) { console.warn("[wall] hero 3D init failed:", e && e.message); heroReady = false; elHero.classList.add("fallback"); }
    } else {
      elHero.classList.add("fallback");
    }

    sizeChart();
    // set default active range button
    (function () {
      var b = document.querySelector('.rangeBtn[data-range="1D"]');
      if (b) b.classList.add("active");
    })();

    requestAnimationFrame(frame);
    poll();
    setInterval(poll, POLL_MS);
    // safety: never leave the boot spinner forever
    setTimeout(bootDone, 8000);

  })();
  </script>
</body>
</html>
