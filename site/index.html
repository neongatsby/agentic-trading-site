<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c081c">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Agentic Trading — Live</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #08090d; overflow-x: hidden; }
  body { font-family: "Avenir Next", Avenir, -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  /* scale-to-viewport-width wrapper (design root is 1080px wide, portrait) */
  #scaler { position: relative; width: 100%; }
  #stage  { position: absolute; top: 0; left: 0; width: 1080px; transform-origin: top left; }
  #skin-root { width: 1080px; }

  /* keyframes used by the skins */
  @keyframes bulbPulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
  @keyframes dotPulse  { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: .5; transform: scale(.8) } }
  @keyframes tickerX   { from { transform: translateX(0) } to { transform: translateX(-50%) } }
  @keyframes sweepX    { 0% { transform: translateX(-130%) } 100% { transform: translateX(430%) } }

  /* top-right chrome: discreet (i) info + labeled "vibe" menu */
  #top-chrome { position: fixed; top: 12px; right: 12px; z-index: 9999; display: flex; align-items: flex-start; gap: 8px; }
  #how-link {
    width: 34px; height: 34px; flex: none; display: flex; align-items: center; justify-content: center;
    font: italic 700 16px/1 Georgia, "Times New Roman", serif; color: rgba(255,255,255,0.7); text-decoration: none;
    background: rgba(12,10,20,0.55); backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 50%; box-shadow: 0 6px 24px rgba(0,0,0,0.45);
    transition: color .18s ease, background .18s ease;
  }
  #how-link:hover { color: #fff; background: rgba(30,26,44,0.7); }

  .vibe-menu { position: relative; }
  #vibe-trigger {
    appearance: none; cursor: pointer; display: flex; align-items: center; gap: 9px;
    background: rgba(12,10,20,0.55); backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; box-shadow: 0 6px 24px rgba(0,0,0,0.45);
    padding: 8px 13px; color: rgba(255,255,255,0.9);
    font: 600 12px/1 "Avenir Next", Avenir, -apple-system, system-ui, sans-serif; letter-spacing: 0.4px;
  }
  #vibe-trigger .vibe-dot { width: 9px; height: 9px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px currentColor; }
  #vibe-trigger .vibe-sub { color: rgba(255,255,255,0.5); font-weight: 500; letter-spacing: 0.3px; }
  #vibe-trigger .vibe-caret { color: rgba(255,255,255,0.5); font-size: 10px; transition: transform .18s ease; }
  #skin-toggle.open #vibe-trigger .vibe-caret { transform: rotate(180deg); }

  #vibe-list {
    display: none; position: absolute; top: calc(100% + 8px); right: 0; min-width: 196px;
    background: rgba(14,12,22,0.82); backdrop-filter: blur(18px) saturate(1.4); -webkit-backdrop-filter: blur(18px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 14px; box-shadow: 0 14px 44px rgba(0,0,0,0.55); padding: 6px;
  }
  #skin-toggle.open #vibe-list { display: block; }
  #vibe-list button {
    appearance: none; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 11px; text-align: left;
    background: transparent; border: 0; border-radius: 10px; padding: 9px 11px; color: rgba(255,255,255,0.85);
    font: 600 13px/1 "Avenir Next", Avenir, -apple-system, system-ui, sans-serif;
  }
  #vibe-list button:hover { background: rgba(255,255,255,0.07); }
  #vibe-list button .d { width: 10px; height: 10px; border-radius: 50%; flex: none; box-shadow: 0 0 8px currentColor; }
  #vibe-list button .lab { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  #vibe-list button .lab small { color: rgba(255,255,255,0.5); font-weight: 500; font-size: 11px; letter-spacing: 0.3px; }
  #vibe-list button .chk { opacity: 0; color: #fff; font-size: 13px; }
  #vibe-list button[aria-checked="true"] { background: rgba(255,255,255,0.06); }
  #vibe-list button[aria-checked="true"] .chk { opacity: 0.95; }

  /* tappable position / trade rows → reveal the "why" */
  .at-row { cursor: pointer; transition: box-shadow .15s ease; }
  .at-row:hover { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22); }

  /* approval card — spent state after a tap */
  .appr-done { opacity: 0.5; }
  .appr-done button { cursor: default; }

  /* detail sheet (rendered outside the scaled stage, at device scale) */
  #at-detail { position: fixed; inset: 0; z-index: 10000; display: flex; align-items: flex-end; justify-content: center; }
  #at-detail .at-scrim { position: absolute; inset: 0; background: rgba(4,3,10,0.6); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
  #at-detail .at-card { position: relative; width: min(440px, 92vw); margin: 0 0 max(16px, env(safe-area-inset-bottom)); border-radius: 20px; padding: 22px 22px 24px; box-shadow: 0 24px 70px rgba(0,0,0,0.6); animation: atSheetIn .22s cubic-bezier(.2,.8,.2,1); }
  #at-detail .at-x { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border: 0; border-radius: 50%; cursor: pointer; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center; }
  #at-detail .at-x:hover { background: rgba(255,255,255,0.16); color: #fff; }
  @keyframes atSheetIn { from { opacity: 0; transform: translateY(14px) scale(.98) } to { opacity: 1; transform: none } }
  @media (min-width: 560px) { #at-detail { align-items: center; } #at-detail .at-card { margin: 0; } }
</style>
</head>
<body>

<div id="top-chrome">
  <a id="how-link" href="/how-it-works.html" title="How it works" aria-label="How it works">i</a>
  <div id="skin-toggle" class="vibe-menu" role="group" aria-label="Theme">
    <button id="vibe-trigger" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Choose a vibe">
      <span class="vibe-dot"></span>
      <span id="vibe-current">Glass</span>
      <span class="vibe-sub" id="vibe-current-sub">pro terminal</span>
      <span class="vibe-caret">&#9662;</span>
    </button>
    <div id="vibe-list" role="menu" aria-label="Theme">
      <button type="button" data-skin="glass" role="menuitemradio" aria-checked="true">
        <span class="d" style="color:#34d399;background:#34d399"></span>
        <span class="lab"><b>Glass</b><small>pro terminal</small></span>
        <span class="chk">&#10003;</span>
      </button>
      <button type="button" data-skin="neon" role="menuitemradio" aria-checked="false">
        <span class="d" style="color:#22d3ee;background:#22d3ee"></span>
        <span class="lab"><b>Neon</b><small>arcade</small></span>
        <span class="chk">&#10003;</span>
      </button>
      <button type="button" data-skin="gold" role="menuitemradio" aria-checked="false">
        <span class="d" style="color:#ffd27a;background:#ffd27a"></span>
        <span class="lab"><b>Gold</b><small>high roller</small></span>
        <span class="chk">&#10003;</span>
      </button>
    </div>
  </div>
</div>

<div id="scaler">
  <div id="stage">
    <div id="skin-root"></div>
  </div>
</div>

<!-- The visual engine. Loaded ONCE; it self-registers the custom elements. -->
<script src="/slot-visuals.js"></script>

<script>
(function () {
  "use strict";
  // Set the render-resolution multiplier BEFORE any WebGL component boots (they read window.__hiDPR).
  window.__hiDPR = Math.max(1, (window.innerWidth / 1080) * 0.9);

  /* ─────────────────────────── palettes (verbatim from the .dc.html renderVals) ─────────────────────────── */
  const palA = { activeBg:'rgba(52,211,153,0.14)', activeFg:'#6ee7b7', activeBorder:'rgba(52,211,153,0.4)', idleFg:'rgba(255,255,255,0.45)', upBg:'rgba(52,211,153,0.15)', upFg:'#6ee7b7', upBorder:'rgba(52,211,153,0.4)', dnBg:'rgba(248,113,113,0.15)', dnFg:'#fca5a5', dnBorder:'rgba(248,113,113,0.4)', okFg:'#6ee7b7', failFg:'#fca5a5' };
  const palB = { activeBg:'rgba(34,211,238,0.14)', activeFg:'#67e8f9', activeBorder:'rgba(34,211,238,0.45)', idleFg:'rgba(241,238,252,0.45)', upBg:'rgba(34,211,238,0.16)', upFg:'#a5f3fc', upBorder:'rgba(34,211,238,0.45)', dnBg:'rgba(251,113,133,0.16)', dnFg:'#fda4af', dnBorder:'rgba(251,113,133,0.45)', okFg:'#67e8f9', failFg:'#fda4af' };
  const palC = { activeBg:'rgba(255,210,122,0.14)', activeFg:'#ffe9b0', activeBorder:'rgba(255,210,122,0.45)', idleFg:'rgba(247,239,223,0.45)', upBg:'rgba(255,210,122,0.15)', upFg:'#ffe9b0', upBorder:'rgba(255,210,122,0.45)', dnBg:'rgba(255,94,122,0.16)', dnFg:'#ffb3c0', dnBorder:'rgba(255,94,122,0.45)', okFg:'#ffe9b0', failFg:'#ffb3c0' };

  const SEP = '    ◇    ';

  /* ─────────────────────────── small helpers ─────────────────────────── */
  function num(x){ const n = Number(x); return isFinite(n) ? n : 0; }
  function money(n){ return num(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtShares(q){ if (q % 1 === 0) return String(q); return q < 1 ? q.toFixed(4) : q.toFixed(2); }
  function pct1(n){ return (n >= 0 ? '+' : '−') + Math.abs(n).toFixed(1) + '%'; }
  function hmm(ts){ const d = new Date(ts); if (isNaN(d.getTime())) return ''; let h = d.getHours() % 12; if (h === 0) h = 12; return h + ':' + String(d.getMinutes()).padStart(2, '0'); }
  function stripMd(s){ return String(s || '').replace(/\*\*/g, '').replace(/^\s*\d{1,2}:\d{2}\s*(?:am|pm)?\s*[—–-]\s*/i, '').trim(); }
  function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function (c){ return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]; }); }
  function css(o){
    const unitless = { opacity:1, zIndex:1, fontWeight:1, lineHeight:1, flex:1, flexGrow:1, order:1, zoom:1 };
    return Object.keys(o).map(function (k){
      let v = o[k];
      const kk = k.replace(/[A-Z]/g, function (m){ return '-' + m.toLowerCase(); });
      if (typeof v === 'number' && !unitless[k]) v = v + 'px';
      return kk + ':' + v;
    }).join(';');
  }
  function setText(root, sel, txt){ const el = root.querySelector(sel); if (el) el.textContent = txt; }

  /* ─────────────────────────── trade inference (works today; explicit fields win when present) ─────────────────────────── */
  function inferSide(text){
    const t = String(text || '').toLowerCase();
    if (/\bshort(ed|ing)?\b/.test(t)) return 'SHORT';
    if (/\b(bought|buy|buying|added|adding|topped up|staged|accumulat)/.test(t)) return 'BUY';
    if (/\b(sold|selling|sell|trimmed|exited|closed out|took profit|dumped)\b/.test(t)) return 'SELL';
    return 'BUY';
  }
  function inferStatus(text){
    // drop "good-till-canceled" / GTC (a stop-order term, NOT a cancellation of this trade) before scanning
    const t = String(text || '').toLowerCase().replace(/good[\s-]*til+l?[\s-]*cancell?ed|\bgtc\b/g, ' ');
    if (/\b(failed|could not|couldn.t|no shares to borrow|rejected|not filled|didn.t fill|unable to fill)\b/.test(t)) return 'FAILED';
    if (/\border\s+cancell?ed|\bcancell?ed the|\bcancell?ed\b/.test(t)) return 'CANCELLED';
    return 'FILLED';
  }
  function inferDetail(f){
    if (f.detail) return f.detail;
    if (f.size) return f.size;
    const txt = String(f.text || '');
    let m = txt.match(/(\d+(?:\.\d+)?)\s*(?:shares?|sh)\s*(?:@|at)\s*\$?\s*(\d+(?:\.\d+)?)/i);
    if (m) return m[1] + ' @ ' + m[2];
    m = txt.match(/(\d+(?:\.\d+)?)\s*(?:@|at)\s*\$?\s*(\d+(?:\.\d+)?)/i);
    if (m) return m[1] + ' @ ' + m[2];
    m = txt.match(/\$\s?(\d[\d,]*(?:\.\d+)?)/);
    if (m) return '$' + m[1];
    return '';
  }

  /* ─────────────────────────── state ─────────────────────────── */
  let DATA = null;
  let currentSkin = 'glass';   /* default: Glass Terminal (F2) */
  let currentRange = '1D';
  let currentRoot = null;
  let lastValue = null;
  let ro = null;

  const SKINS = {
    glass: { pal: palA, build: buildGlass },
    neon:  { pal: palB, build: buildNeon },
    gold:  { pal: palC, build: buildGold }
  };

  /* labeled "vibe" menu copy + accent dot per skin (F2) */
  const VIBES = {
    glass: { name: 'Glass', sub: 'pro terminal', dot: '#34d399' },
    neon:  { name: 'Neon',  sub: 'arcade',       dot: '#22d3ee' },
    gold:  { name: 'Gold',  sub: 'high roller',  dot: '#ffd27a' }
  };

  /* in-design trade approval (F1) */
  const APPROVE_ENDPOINT = '/.netlify/functions/approve';
  async function doApprove(id, symbol, action, mode, cardEl){
    if(!id) return;
    let pin = localStorage.getItem('at-pin');
    if(!pin){ pin = prompt('Enter your approval PIN (set once):'); if(!pin) return; localStorage.setItem('at-pin', pin.trim()); pin = pin.trim(); }
    const btns = cardEl.querySelectorAll('button'); const status = cardEl.querySelector('.appr-status');
    const reenable = ()=> btns.forEach(b=>b.disabled=false);
    btns.forEach(b=>b.disabled=true);
    if(status) status.textContent = mode==='prearm'?'Pre-arming…':(action==='skip'?'Skipping…':'Approving…');
    try{
      const r = await fetch(APPROVE_ENDPOINT,{method:'POST',headers:{'content-type':'application/json'},
        body: JSON.stringify({ id, action, mode, symbol, pin })});
      if(r.status===401){ localStorage.removeItem('at-pin'); if(status) status.textContent='Wrong PIN — tap again.'; reenable(); return; }
      if(r.status===503){ if(status) status.textContent='In-app approval isn’t switched on yet — use Telegram.'; return; }
      if(!r.ok){ if(status) status.textContent='Hiccup — try again.'; reenable(); return; }
      cardEl.classList.add('appr-done');
      if(status) status.textContent = action==='skip' ? 'Skipped.' : (mode==='prearm' ? 'Pre-armed — resting buy-stop within ~60s.' : 'Approved — filling within ~60s.');
    }catch(e){ if(status) status.textContent='Network hiccup — try again.'; reenable(); }
  }

  function live(){ return (DATA && DATA.live) || {}; }

  /* ─────────────────────────── data → design shapes ─────────────────────────── */
  function heroText(){ return '$' + money(live().equity); }
  function todayPct(){ const eq = num(live().equity), dp = num(live().day_pnl), prev = eq - dp; return prev ? (dp / prev * 100) : 0; }
  function pillText(){
    const t$ = num(live().day_pnl), up = t$ >= 0, p = todayPct();
    return (up ? '▲ +$' : '▼ −$') + Math.abs(t$).toFixed(2) + ' · ' + (up ? '+' : '−') + Math.abs(p).toFixed(1) + '% today';
  }

  function arr(x){ return Array.isArray(x) ? x : []; }
  function tailByTime(pairs, span){
    if (!pairs.length) return [];
    const lastTs = pairs[pairs.length - 1][0];
    return pairs.filter(function (p){ return p[0] >= lastTs - span; });
  }
  function equityPoints(range){
    const eh = (DATA && DATA.equity_history) || {};
    let pairs;
    if (range === '1H') { const d = arr(eh['1D']); pairs = tailByTime(d, 60 * 60 * 1000); if (pairs.length < 2) pairs = d; }
    else if (range === '6M') { const y = arr(eh['1Y']); pairs = tailByTime(y, 180 * 86400000); if (pairs.length < 2) pairs = y; }
    else { pairs = arr(eh[range]); }
    let pts = pairs.map(function (p){ return Array.isArray(p) ? p[1] : (p && p.v); }).filter(function (n){ return typeof n === 'number' && isFinite(n); });
    if (pts.length < 2) pts = arr(eh['1D']).map(function (p){ return p[1]; }).filter(function (n){ return typeof n === 'number'; });
    if (pts.length < 2) pts = arr(live().equity_curve).map(function (p){ return p.value; }).filter(function (n){ return typeof n === 'number'; });
    if (pts.length < 2) pts = arr(live().intraday).map(function (p){ return p.v; }).filter(function (n){ return typeof n === 'number'; });
    return pts;
  }

  function computeModel(){
    const L = live();
    const equity = num(L.equity), dayPnl = num(L.day_pnl), totalPnl = num(L.total_pnl);
    const allTimePct = totalPnl / 1000 * 100;
    const marketOpen = String((DATA && DATA.market_note) || '').indexOf('OPEN') !== -1;
    const status = marketOpen ? 'Engine live — working the market' : 'Engine resting — next wake at the open';

    const cov = arr(DATA && DATA.coverage);
    const covBy = function (s){ return cov.find(function (c){ return c.ticker === s; }); };

    const positions = arr(L.positions).map(function (p){
      const qty = parseFloat(p.qty) || 0, cur = num(p.current), mv = qty * cur, plpc = num(p.plpc);
      const c = covBy(p.symbol);
      return { t: p.symbol, name: c ? c.name : p.symbol, sh: fmtShares(qty), val: '$' + money(mv), mv: mv, up: plpc >= 0, pct: pct1(plpc), thesis: p.thesis || '', entry: num(p.entry), current: cur, pl: num(p.pl) };
    });

    // top holding = live position with largest market value
    let top = null, thHead = 'TOP HOLDING', thBlurb = '';
    if (positions.length) {
      top = positions.slice().sort(function (a, b){ return b.mv - a.mv; })[0];
      const c = covBy(top.t);
      const pctBook = equity ? top.mv / equity * 100 : 0;
      thHead = 'TOP HOLDING · ' + top.t + ' · ' + Math.round(pctBook) + '% OF BOOK';
      thBlurb = stripMd((c && c.thesis) || top.thesis || (DATA && DATA.latest_recap) || '');
    }

    const trades = arr(DATA && DATA.feed)
      .filter(function (f){ return f.type === 'trade' && f.account === 'live'; })
      .slice().sort(function (a, b){ return new Date(b.ts) - new Date(a.ts); })
      .map(function (f){
        const side = (f.side ? String(f.side) : inferSide(f.text)).toUpperCase();
        const st = (f.status ? String(f.status) : inferStatus(f.text)).toUpperCase();
        return { time: hmm(f.ts), side: side, kind: side.toLowerCase(), tk: f.symbol, detail: inferDetail(f), status: st, ok: st === 'FILLED', text: f.text || '', ts: f.ts };
      });

    const notes = arr(DATA && DATA.pulse).map(function (p){ return { time: hmm(p.ts), text: stripMd(p.hype || p.text || '') }; });

    let news;
    if (Array.isArray(DATA && DATA.headlines) && DATA.headlines.length) news = DATA.headlines.join(SEP) + SEP;
    else if (cov.length) news = cov.map(function (c){ return c.ticker + ' ' + pct1(num(c.chg_pct)) + ' · ' + (c.theme || ''); }).join(SEP) + SEP;
    else { const rec = String((DATA && DATA.latest_recap) || ''); news = rec.split(/[.;]\s+/).map(function (s){ return s.trim(); }).filter(Boolean).join(SEP) + SEP; }

    return { equity: equity, dayPnl: dayPnl, allTimePct: allTimePct, status: status, positions: positions, thHead: thHead, thBlurb: thBlurb, trades: trades, notes: notes, news: news };
  }

  /* ─────────────────────────── style-derivation helpers (verbatim logic from renderVals) ─────────────────────────── */
  function chipStyle(up, pal){ return css({ font:'700 17px ui-monospace, Menlo, monospace', padding:'8px 14px', borderRadius:999, background: up ? pal.upBg : pal.dnBg, color: up ? pal.upFg : pal.dnFg }); }
  function badgeStyle(kind, pal){ return css({ font:'800 14px ui-monospace, Menlo, monospace', letterSpacing:'1px', padding:'7px 12px', borderRadius:8, width:56, textAlign:'center', background: kind === 'buy' ? pal.upBg : kind === 'sell' ? pal.dnBg : 'rgba(255,255,255,0.08)', color: kind === 'buy' ? pal.upFg : kind === 'sell' ? pal.dnFg : 'rgba(255,255,255,0.6)' }); }
  function statusChipStyle(ok, pal){ return css({ font:'700 13px ui-monospace, Menlo, monospace', letterSpacing:'1px', color: ok ? pal.okFg : pal.failFg, opacity: ok ? 0.7 : 1 }); }

  /* ─────────────────────────── list renderers (markup per skin, from the .dc.html) ─────────────────────────── */
  function renderPositions(root, positions){
    const box = root.querySelector('[data-role=positions]'); if (!box) return;
    const pal = SKINS[currentSkin].pal;
    box.innerHTML = positions.map(function (p){
      const chip = chipStyle(p.up, pal);
      if (currentSkin === 'glass') {
        return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)">' +
          '<div style="width:84px;font:600 20px/1 \'Avenir Next Condensed\',\'Avenir Next\',\'Arial Narrow\',system-ui,sans-serif;letter-spacing:0.5px">' + escapeHtml(p.t) + '</div>' +
          '<div style="flex:1;display:flex;flex-direction:column;gap:3px">' +
            '<span style="font:500 15px/1 system-ui,sans-serif;color:rgba(255,255,255,0.5)">' + escapeHtml(p.name) + '</span>' +
            '<span style="font:500 14px/1 system-ui,sans-serif;color:rgba(255,255,255,0.35)">' + escapeHtml(p.sh) + ' sh</span>' +
          '</div>' +
          '<div style="font:600 17px/1 ui-monospace,Menlo,monospace">' + escapeHtml(p.val) + '</div>' +
          '<div style="' + chip + '">' + escapeHtml(p.pct) + '</div>' +
        '</div>';
      }
      if (currentSkin === 'neon') {
        return '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:11px;margin-bottom:8px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);box-shadow:inset 0 1px 0 rgba(255,255,255,0.18)">' +
          '<div style="width:80px;font:600 20px/1 \'Avenir Next Condensed\',\'Avenir Next\',\'Arial Narrow\',system-ui,sans-serif;letter-spacing:0.5px;color:#e0f6ff">' + escapeHtml(p.t) + '</div>' +
          '<div style="flex:1;font:500 14px/1.3 system-ui,sans-serif;color:rgba(241,238,252,0.45)">' + escapeHtml(p.sh) + ' sh · ' + escapeHtml(p.val) + '</div>' +

        '<div style="flex:1;font:500 14px/1.3 system-ui,sans-serif;color:rgba(247,239,223,0.45)">' + escapeHtml(p.sh) + ' sh · ' + escapeHtml(p.val) + '</div>' +
        '<div style="' + chip + '">' + escapeHtml(p.pct) + '</div>' +
      '</div>';
    }).join('');
    /* F3: each row is tappable → reveal its thesis */
    Array.prototype.forEach.call(box.children, function (el, i){
      el.classList.add('at-row');
      el.addEventListener('click', function (){ openDetail('position', positions[i]); });

  function renderNotes(root, notes){

  function renderRanges(root){
    const box = root.querySelector('[data-role=ranges]'); if (!box) return;
    const pal = SKINS[currentSkin].pal;
    box.innerHTML = '';
    ['1H', '1D', '1W', '1M', '6M', '1Y'].forEach(function (r){
      const active = currentRange === r;
      const base = { padding:'9px 20px', borderRadius:11, font:'500 18px "Avenir Next", Avenir, -apple-system, system-ui, sans-serif', cursor:'pointer', letterSpacing:'0.5px' };
      const st = active
        ? Object.assign({}, base, { background: pal.activeBg, color: pal.activeFg, border: '1px solid ' + pal.activeBorder })
        : Object.assign({}, base, { background: 'transparent', color: pal.idleFg, border: '1px solid transparent' });
      const b = document.createElement('button');
      b.type = 'button';
      b.style.cssText = css(st);

  /* ─────────────────────────── F1 · in-design trade approval ─────────────────────────── */
  function marketClosed(){ return String((DATA && DATA.market_note) || '').indexOf('OPEN') === -1; }
  function apprSkin(){
    if (currentSkin === 'glass') return { card:'background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.24);border-radius:16px', accent:'#6ee7b7', label:'#6ee7b7', text:'rgba(255,255,255,0.82)', sub:'rgba(255,255,255,0.5)' };
    if (currentSkin === 'neon')  return { card:'backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);background:linear-gradient(90deg, rgba(34,211,238,0.12), rgba(232,121,249,0.10));border:1px solid rgba(34,211,238,0.4);border-radius:18px;box-shadow:inset 0 1.5px 0 rgba(255,255,255,0.22), 0 14px 40px rgba(0,0,0,0.35)', accent:'#a5f3fc', label:'#67e8f9', text:'rgba(241,238,252,0.85)', sub:'rgba(241,238,252,0.5)' };
    return { card:'background:linear-gradient(90deg, rgba(255,210,122,0.1), rgba(255,94,122,0.06));border:1px solid rgba(255,210,122,0.4);border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,233,176,0.25)', accent:'#ffe9b0', label:'#ffd27a', text:'rgba(247,239,223,0.85)', sub:'rgba(247,239,223,0.5)' };
  }
  function apprBtn(kind, pal, sk){
    const base = 'appearance:none;cursor:pointer;font:700 15px/1 "Avenir Next", Avenir, -apple-system, system-ui, sans-serif;letter-spacing:0.3px;padding:12px 16px;border-radius:12px;';
    if (kind === 'approve') return base + 'background:' + pal.upBg + ';color:' + pal.upFg + ';border:1px solid ' + pal.upBorder + ';';
    if (kind === 'prearm')  return base + 'background:transparent;color:' + sk.accent + ';border:1px solid ' + pal.activeBorder + ';';
    return base + 'background:rgba(255,255,255,0.05);color:' + sk.sub + ';border:1px solid rgba(255,255,255,0.14);';
  }
  function renderApprovals(root){
    const box = root.querySelector('[data-role=approvals]'); if (!box) return;
    const tickets = arr(DATA && DATA.pending_tickets).filter(function (t){ return t && t.id; });
    if (!tickets.length) { box.innerHTML = ''; box.style.display = 'none'; return; }   /* F1: nothing renders when empty */
    box.style.display = 'flex';
    const pal = SKINS[currentSkin].pal, sk = apprSkin(), closed = marketClosed();
    box.innerHTML = tickets.map(function (t){
      const kind = String(t.side || 'buy').toLowerCase();
      const sideLabel = String(t.side || 'BUY').toUpperCase();
      const size = t.size || (t.qty != null && t.qty !== '' ? fmtShares(parseFloat(t.qty) || 0) + ' sh' : '');
      const trig = (t.trigger != null && t.trigger !== '') ? t.trigger : t.entry;
      const hasTrig = (trig != null && trig !== '');
      return '<div data-appr-card data-id="' + escapeHtml(t.id) + '" data-symbol="' + escapeHtml(t.symbol || '') + '" style="' + sk.card + ';padding:18px 20px;display:flex;flex-direction:column;gap:12px">' +
        '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">' +
          '<div style="' + badgeStyle(kind, pal) + '">' + escapeHtml(sideLabel) + '</div>' +
          '<div style="font:700 24px/1 \'Avenir Next Condensed\',\'Avenir Next\',\'Arial Narrow\',system-ui,sans-serif;letter-spacing:0.5px;color:' + sk.accent + '">' + escapeHtml(t.symbol || '') + '</div>' +
          (size ? '<div style="font:600 15px/1 ui-monospace,Menlo,monospace;color:' + sk.text + '">' + escapeHtml(size) + '</div>' : '') +
          '<div style="flex:1"></div>' +
          '<div style="font:700 12px/1 system-ui, sans-serif;letter-spacing:2px;color:' + sk.label + '">NEEDS&nbsp;YOUR&nbsp;OK</div>' +
        '</div>' +
        (t.thesis ? '<div style="font:400 15px/1.5 system-ui, sans-serif;color:' + sk.text + '">' + escapeHtml(stripMd(t.thesis)) + '</div>' : '') +
        (closed ? '<div style="font:500 13px/1.4 system-ui, sans-serif;color:' + sk.sub + '">Market closed — this queues for the open.</div>' : '') +
        '<div style="display:flex;gap:10px;flex-wrap:wrap">' +
          '<button type="button" data-action="approve" data-mode="now" style="' + apprBtn('approve', pal, sk) + '">Approve → buy now</button>' +
          (hasTrig ? '<button type="button" data-action="approve" data-mode="prearm" style="' + apprBtn('prearm', pal, sk) + '">Pre-arm · auto @ $' + escapeHtml(String(trig)) + '</button>' : '') +
          '<button type="button" data-action="skip" data-mode="now" style="' + apprBtn('skip', pal, sk) + '">Skip</button>' +
        '</div>' +
        '<div class="appr-status" style="font:500 13px/1.4 ui-monospace,Menlo,monospace;color:' + sk.sub + ';min-height:16px"></div>' +
      '</div>';
    }).join('');
    box.querySelectorAll('[data-appr-card]').forEach(function (card){
      const id = card.getAttribute('data-id'), symbol = card.getAttribute('data-symbol');
      card.querySelectorAll('button').forEach(function (b){
        b.addEventListener('click', function (){ doApprove(id, symbol, b.getAttribute('data-action'), b.getAttribute('data-mode'), card); });
      });
    });
  }

  /* ─────────────────────────── F3 · tap a row → the "why" detail sheet ─────────────────────────── */
  function onDetailKey(e){ if (e.key === 'Escape') closeDetail(); }
  function closeDetail(){ const m = document.getElementById('at-detail'); if (m) m.remove(); document.removeEventListener('keydown', onDetailKey); }
  function sheetStyle(){
    if (currentSkin === 'glass') return { bg:'linear-gradient(180deg,#10131d,#0b0e15)', border:'1px solid rgba(52,211,153,0.28)', accent:'#6ee7b7', text:'#eef1f6', sub:'rgba(255,255,255,0.55)' };
    if (currentSkin === 'neon')  return { bg:'linear-gradient(180deg,#1b1140,#120b2a)', border:'1px solid rgba(34,211,238,0.4)', accent:'#67e8f9', text:'#f1eefc', sub:'rgba(241,238,252,0.55)' };
    return { bg:'linear-gradient(180deg,#1c1207,#120c05)', border:'1px solid rgba(255,210,122,0.4)', accent:'#ffe9b0', text:'#f7efdf', sub:'rgba(247,239,223,0.55)' };
  }
  function openDetail(kind, item){
    if (!item) return;
    closeDetail();
    const pal = SKINS[currentSkin].pal, s = sheetStyle();
    let head = '', meta = '', body = '', tag = '';
    if (kind === 'position') {
      tag = 'WHY&nbsp;WE&nbsp;HOLD&nbsp;IT';
      head = '<div style="font:700 26px/1 \'Avenir Next Condensed\',\'Avenir Next\',\'Arial Narrow\',system-ui,sans-serif;letter-spacing:0.5px;color:' + s.accent + '">' + escapeHtml(item.t) + '</div>' +
             '<div style="font:500 14px/1.3 system-ui, sans-serif;color:' + s.sub + ';margin-top:4px">' + escapeHtml(item.name) + ' · ' + escapeHtml(item.sh) + ' sh</div>';
      meta = '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 0 2px">' +
        '<div style="font:600 15px/1 ui-monospace,Menlo,monospace;color:' + s.text + '">$' + money(item.entry) + ' → $' + money(item.current) + '</div>' +
        '<div style="' + chipStyle(item.up, pal) + '">' + escapeHtml(item.pct) + '</div>' +
        '<div style="font:600 14px/1 ui-monospace,Menlo,monospace;color:' + (item.up ? pal.upFg : pal.dnFg) + '">' + (item.pl >= 0 ? '+' : '−') + '$' + money(Math.abs(item.pl)) + '</div>' +
      '</div>';
      body = item.thesis ? escapeHtml(stripMd(item.thesis)) : 'No note recorded.';
    } else {
      tag = 'WHY&nbsp;THIS&nbsp;TRADE';
      head = '<div style="display:flex;align-items:center;gap:11px">' +
        '<div style="' + badgeStyle(item.kind, pal) + '">' + escapeHtml(item.side) + '</div>' +
        '<div style="font:700 24px/1 \'Avenir Next Condensed\',\'Avenir Next\',\'Arial Narrow\',system-ui,sans-serif;letter-spacing:0.5px;color:' + s.accent + '">' + escapeHtml(item.tk) + '</div>' +
      '</div>';
      meta = '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:12px 0 2px;font:600 13px/1 ui-monospace,Menlo,monospace;color:' + s.sub + '">' +
        (item.time ? '<span>' + escapeHtml(item.time) + '</span>' : '') +
        '<span style="' + statusChipStyle(item.ok, pal) + '">' + escapeHtml(item.status) + '</span>' +
        (item.detail ? '<span>' + escapeHtml(item.detail) + '</span>' : '') +
      '</div>';
      body = item.text ? escapeHtml(stripMd(item.text)) : 'No note recorded.';
    }
    const wrap = document.createElement('div');
    wrap.id = 'at-detail';
    wrap.innerHTML =
      '<div class="at-scrim"></div>' +
      '<div class="at-card" style="background:' + s.bg + ';border:' + s.border + '">' +
        '<button type="button" class="at-x" aria-label="Close">&#10005;</button>' +
        '<div style="font:700 12px/1 system-ui, sans-serif;letter-spacing:2.5px;color:' + s.accent + ';opacity:0.85;margin-bottom:12px">' + tag + '</div>' +
        head + meta +
        '<div style="font:400 15px/1.55 system-ui, sans-serif;color:' + s.text + ';margin-top:12px">' + body + '</div>' +
      '</div>';
    document.body.appendChild(wrap);
    wrap.querySelector('.at-scrim').addEventListener('click', closeDetail);
    wrap.querySelector('.at-x').addEventListener('click', closeDetail);
    document.addEventListener('keydown', onDetailKey);
  }

  /* full data-driven refresh of the lists / header (never touches the hero value or WebGL contexts) */
  function renderLists(root){
    if (!DATA) return;
    const m = computeModel();
    renderApprovals(root);            /* F1: re-render on every mount + poll */
    setText(root, '[data-role=status]', m.status);
    const at = root.querySelector('[data-role=alltime]'); if (at) at.textContent = pct1(m.allTimePct);
    root.querySelectorAll('[data-role=news]').forEach(function (n){ n.textContent = m.news; });
    renderPositions(root, m.positions);
    renderTrades(root, m.trades);
    renderNotes(root, m.notes);
    setText(root, '[data-role=th-head]', m.thHead);
    setText(root, '[data-role=th-blurb]', m.thBlurb);
  }

  /* ─────────────────────────── clock ─────────────────────────── */
  function tickClock(root){
    if (!root) return;
    const now = new Date();
    const c = root.querySelector('[data-role=clock]'); if (c) c.textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
    const d = root.querySelector('[data-role=date]'); if (d) d.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  /* ─────────────────────────── range switch → chart + per-range up/down ─────────────────────────── */
  function setRange(range){
    currentRange = range;
    const root = currentRoot; if (!root) return;
    renderRanges(root);
    const pts = DATA ? equityPoints(range) : [];
    const up = pts.length >= 2 ? (pts[pts.length - 1] >= pts[0]) : true;
    const trend = up ? 'up' : 'down';
    const chart = root.querySelector('equity-chart');
    const ribbon = root.querySelector('chart-ribbon');
    const pf = root.querySelector('particle-field');
    const pill = root.querySelector('value-pill');
    if (pts.length >= 2) {
      if (chart && chart.setData) chart.setData(pts, range);
      if (ribbon && ribbon.setData) ribbon.setData(pts, range); /* 1b: same array to BOTH (§3) */
    }
    if (chart) { chart.setAttribute('trend', trend); chart.setAttribute('range', range); }
    if (ribbon) { ribbon.setAttribute('trend', trend); ribbon.setAttribute('range', range); }
    if (pf) pf.setAttribute('mode', trend);
    if (pill) pill.setAttribute('mode', trend);
  }

  /* ─────────────────────────── live tick (imperative hero + acct-tick), never re-renders the hero ─────────────────────────── */
  function seedValueUI(root){
    const hero = root.querySelector('hero-3d'); if (hero) hero.setAttribute('value', heroText());
    const pill = root.querySelector('value-pill'); if (pill) pill.setAttribute('text', pillText());
    lastValue = num(live().equity);
  }
  function liveTick(root){
    if (!DATA) return;
    const eq = num(live().equity);
    if (eq === lastValue) return;
    const hero = root.querySelector('hero-3d');
    if (hero) hero.setAttribute('value', heroText());                 /* 1. imperative hero value */
    const pill = root.querySelector('value-pill');
    const up = num(live().day_pnl) >= 0;
    const txt = pillText();
    const modeDown = pill && (pill.getAttribute('mode') || 'up') === 'down';
    if (pill && !modeDown) window.dispatchEvent(new CustomEvent('acct-tick', { detail: { up: up, text: txt } })); /* 2. pill event */
    else if (pill) pill.setAttribute('text', txt);                    /* gated when range is down — keep text correct */
    lastValue = eq;
  }

  /* ─────────────────────────── mount / switch (ONE skin's WebGL live at a time) ─────────────────────────── */
  function mount(skinKey){
    const host = document.getElementById('skin-root');
    if (currentRoot) { if (ro) { try { ro.disconnect(); } catch (e) {} ro = null; } currentRoot.remove(); currentRoot = null; }
    currentSkin = skinKey;
    const root = SKINS[skinKey].build();     /* fresh DOM → hero-3d / chart-ribbon boot their own contexts */
    host.appendChild(root);
    currentRoot = root;
    lastValue = null;
    renderRanges(root);
    updateToggleActive();
    if (DATA) { renderLists(root); seedValueUI(root); }
    setRange(currentRange);
    tickClock(root);
    if (window.ResizeObserver) { ro = new ResizeObserver(applyScale); ro.observe(root); }
    applyScale();
  }
  function setSkin(skinKey){
    if (!SKINS[skinKey] || skinKey === currentSkin) return;
    try { localStorage.setItem('skin', skinKey); } catch (e) {}
    mount(skinKey);
  }
  function updateToggleActive(){
    const box = document.getElementById('skin-toggle'); if (!box) return;
    box.querySelectorAll('button[data-skin]').forEach(function (b){ b.setAttribute('aria-checked', b.getAttribute('data-skin') === currentSkin ? 'true' : 'false'); });
    const v = VIBES[currentSkin] || VIBES.glass;
    const cur = document.getElementById('vibe-current'); if (cur) cur.textContent = v.name;
    const sub = document.getElementById('vibe-current-sub'); if (sub) sub.textContent = v.sub;
    const dot = box.querySelector('#vibe-trigger .vibe-dot'); if (dot) dot.style.background = v.dot;
  }
  function wireToggle(){
    const box = document.getElementById('skin-toggle'); if (!box) return;
    const trigger = document.getElementById('vibe-trigger');
    const openMenu = function (open){ box.classList.toggle('open', open); if (trigger) trigger.setAttribute('aria-expanded', open ? 'true' : 'false'); };
    if (trigger) trigger.addEventListener('click', function (e){ e.stopPropagation(); openMenu(!box.classList.contains('open')); });
    box.querySelectorAll('button[data-skin]').forEach(function (b){
      b.addEventListener('click', function (e){ e.stopPropagation(); setSkin(b.getAttribute('data-skin')); openMenu(false); });
    });
    document.addEventListener('click', function (){ openMenu(false); });
  }

  /* ─────────────────────────── scale the 1080-wide root to viewport width ─────────────────────────── */
  const SHRINK = 0.9;   // scale everything down ~10% so it isn't oversized on a big 4K screen
  function applyScale(){
    const stage = document.getElementById('stage'), scaler = document.getElementById('scaler');
    if (!stage || !scaler) return;
    const s = (window.innerWidth / 1080) * SHRINK;
    window.__hiDPR = Math.max(1, s);   // tell the WebGL renderers how much the stage is CSS-upscaled → they render crisp
    const offX = Math.max(0, (window.innerWidth - 1080 * s) / 2);   // center horizontally
    stage.style.transform = 'translateX(' + offX + 'px) scale(' + s + ')';
    const natH = currentRoot ? currentRoot.offsetHeight : 1920;
    scaler.style.height = (natH * s) + 'px';
  }

  /* ─────────────────────────── polling ─────────────────────────── */
  function fetchData(){
    if (typeof fetch !== 'function') return Promise.resolve(null);   /* no-op in non-browser (jsdom) contexts */
    const ts = Date.now();
    const urls = ['https://raw.githubusercontent.com/neongatsby/agentic-trading-site/main/site/data.json?t=' + ts, './data.json?t=' + ts];
    return urls.reduce(function (chain, u){
      return chain.then(function (got){
        if (got) return got;
        return fetch(u, { cache: 'no-store' }).then(function (r){ return r.ok ? r.json() : null; }).catch(function (){ return null; });
      });
    }, Promise.resolve(null));
  }
  function poll(){
    return fetchData().then(function (d){
      if (d) DATA = d;
      if (DATA && currentRoot) { renderLists(currentRoot); setRange(currentRange); liveTick(currentRoot); applyScale(); }
      return DATA;
    });
  }

  /* ─────────────────────────── boot ─────────────────────────── */
  function boot(){
    wireToggle();
    window.addEventListener('resize', applyScale);
    try { const saved = localStorage.getItem('skin'); if (saved && SKINS[saved]) currentSkin = saved; } catch (e) {}
    if (!SKINS[currentSkin]) currentSkin = 'glass';   /* default: Glass Terminal (F2) */
    mount(currentSkin);
    setInterval(function (){ tickClock(currentRoot); }, 1000);
    poll();
    setInterval(poll, 15000);
  }

  /* test / debug hooks */
  window.__dash = { mount: mount, setSkin: setSkin, setRange: setRange, poll: poll, computeModel: function (){ return DATA ? computeModel() : null; }, equityPoints: equityPoints, currentSkin: function (){ return currentSkin; }, currentRange: function (){ return currentRange; }, root: function (){ return currentRoot; }, setData: function (d){ DATA = d; } };

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
