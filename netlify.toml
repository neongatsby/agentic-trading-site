[build]
  publish = "site"
  # Skip a Netlify rebuild when a commit only touched site/data.json — the
  # live poller updates that file every ~2 min and the page reads it from
  # GitHub raw, so rebuilding for data would blow the free build minutes.
  # `ignore` returning 0 = skip build; non-zero = build.
  ignore = "git diff --quiet HEAD^ HEAD -- . ':(exclude)site/data.json'"
